# Cloud Build configuration for CI/CD
# This file enables automatic deployments on git push

steps:
  # Build the application
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['ci']
    
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']
    
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/ai-preauth-platform:$SHORT_SHA', '-t', 'gcr.io/$PROJECT_ID/ai-preauth-platform:latest', '.']
    
  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ai-preauth-platform:$SHORT_SHA']
    
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ai-preauth-platform:latest']
    
  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ai-preauth-platform'
      - '--image'
      - 'gcr.io/$PROJECT_ID/ai-preauth-platform:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--set-env-vars'
      - 'GEMINI_API_KEY=${_GEMINI_API_KEY}'

# Store images in Container Registry
images:
  - 'gcr.io/$PROJECT_ID/ai-preauth-platform:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/ai-preauth-platform:latest'

# Substitution variables (set in Cloud Build triggers)
substitutions:
  _GEMINI_API_KEY: ''

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'
